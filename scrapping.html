<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Philippine Senators</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: url("PinasBG.jpg") center center / cover no-repeat fixed;
        color: #f1f5f9;
      }

      .navbar .navbar-brand {
        display: inline-flex;
        align-items: center;
        color: #000;
        font-size: 1.5rem;
        font-weight: 700;
      }

      .senatorCard {
        height: 100%;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        transition: all 0.3s ease;
        border: none;
        overflow: hidden;
        cursor: pointer;
      }

      .senatorCard:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }

      .senatorCard:hover .senatorImg {
        transform: scale(1.08);
      }

      .senatorImageWrapper {
        position: relative;
        overflow: hidden;
        height: 320px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .senatorImg {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
        transition: transform 0.3s ease;
        display: block;
      }

      .placeholderImg {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 3rem;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .senatorCard .card-body {
        padding: 1.25rem;
        flex-grow: 1;
      }

      .senatorParty {
        font-size: 0.85rem;
        color: #6c757d;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .senatorName {
        color: #1f2937;
        font-weight: 600;
        margin-bottom: 0.75rem;
        line-height: 1.3;
        font-size: 1rem;
      }

      h1 {
        color: white;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
      }

      .containerHeader {
        padding: 2rem 0;
      }

      .loadingState {
        text-align: center;
        padding: 4rem 2rem;
        color: white;
      }

      .modal-content {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 20px;
        border: none;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      }

      .modal-header {
        border-bottom: 1px solid #e9ecef;
        padding-bottom: 1rem;
      }

      .modal-body {
        padding: 2rem;
        max-height: 70vh;
        overflow-y: auto;
      }

      .modal-title {
        color: #000 !important;
      }

      .platform-item {
        margin-bottom: 1.5rem;
        padding-left: 1.5rem;
        position: relative;
        color: #000;
      }

      .platform-item::before {
        content: "▸";
        position: absolute;
        left: 0;
        color: #667eea;
        font-weight: bold;
        font-size: 1.2rem;
      }

      .websiteBtn {
        display: inline-flex;
        align-items: center;
        padding: 0.75rem 1.5rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff !important;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
        margin-top: 1rem;
        border: none;
        transition: all 0.3s ease;
      }

      .websiteBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        color: #fff !important;
        text-decoration: none;
      }

      h4, h6 {
        color: #000;
      }

      body.dark-mode {
        background: #07111f url("PinasBG.jpg") center center / cover no-repeat fixed;
        color: #e2e8f0;
      }

      body.dark-mode .navbar {
        background: rgba(10, 18, 33, 0.95) !important;
        border-color: rgba(148, 163, 184, 0.12);
      }

      body.dark-mode .navbar.bg-white,
      body.dark-mode .navbar.border-bottom {
        background: rgba(10, 18, 33, 0.95) !important;
        border-color: rgba(148, 163, 184, 0.15) !important;
      }

      body.dark-mode .navbar-toggler {
        border-color: rgba(226, 232, 240, 0.15);
      }

      body.dark-mode .navbar-toggler-icon {
        filter: invert(1) grayscale(1) contrast(1.2);
      }

      body.dark-mode .navbar .navbar-brand,
      body.dark-mode .navbar .nav-link {
        color: #e2e8f0 !important;
      }

      body.dark-mode .senatorCard {
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.45);
      }

      body.dark-mode .senatorParty,
      body.dark-mode .senatorName,
      body.dark-mode h1,
      body.dark-mode .modal-title,
      body.dark-mode .platform-item,
      body.dark-mode h4,
      body.dark-mode h6,
      body.dark-mode .loadingState {
        color: #e2e8f0;
      }

      body.dark-mode .modal-content {
        background: rgba(15, 23, 42, 0.98);
        color: #e2e8f0;
      }

      body.dark-mode .modal-header {
        border-bottom-color: rgba(148, 163, 184, 0.12);
      }

      body.dark-mode .platform-item {
        color: #d2d9e3;
      }

      body.dark-mode .platform-item::before {
        color: #8b5cf6;
      }

      body.dark-mode .websiteBtn {
        background: linear-gradient(135deg, #5b7de8 0%, #6b5ccf 100%);
      }

      body.dark-mode .placeholderImg {
        background: linear-gradient(135deg, #3b4e72 0%, #10203a 100%);
        color: #d8e3f0;
      }

      body.dark-mode .text-black {
        color: #e2e8f0 !important;
      }

      body.dark-mode .btn-outline-secondary {
        color: #e2e8f0;
        border-color: rgba(226, 232, 240, 0.3);
      }

      body.dark-mode .card {
        background: rgba(15, 23, 42, 0.95);
        border-color: rgba(148, 163, 184, 0.16);
      }
    </style>
  </head>

          platforms: [
            "Education reform and access",
            "Healthcare universal coverage",
            "Infrastructure development",
            "Tourism industry growth",
            "Cultural heritage preservation",
            "Youth employment programs",
            "Foreign policy enhancement"
          ],
          website: "https://imeemarcos.ph/"
        }
      ];

      const senatorModal = new bootstrap.Modal(document.getElementById('senatorModal'));

      function createPlaceholder(initials) {
        return `
          <div class="placeholderImg">
            ${initials}
          </div>
        `;
      }

      function getInitials(fullName) {
        return fullName
          .split(' ')
          .filter(Boolean)
          .map((word) => word[0].toUpperCase())
          .slice(0, 3)
          .join('');
      }

      function createModalContent(senator) {
        let websiteHtml = '';
        if (senator.website) {
          websiteHtml = `<a href="${senator.website}" target="_blank" rel="noopener" class="websiteBtn">Visit Website</a>`;
        }

        return `
          <div class="row">
            <div class="col-md-4 text-center mb-4">
              <img src="${senator.image}" alt="${senator.name}" class="img-fluid rounded mb-3 senatorImgModal" style="width: 200px; height: 280px; object-fit: cover; object-position: top center;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div style="display: none; width: 200px; height: 280px; margin: 0 auto 1rem; background: #f8f9fa; border-radius: 10px; align-items: center; justify-content: center; color: #666; font-weight: bold; font-size: 1.5rem;">
                ${getInitials(senator.name)}
              </div>
              <h4 class="fw-bold mb-1">${senator.name}</h4>
              <p class="text-black mb-0">${senator.party}</p>
              ${websiteHtml}
            </div>
            <div class="col-md-8">
              <h6 class="fw-bold mb-3">About</h6>
              <p class="mb-4">${senator.bio}</p>
              <h6 class="fw-bold mb-3">Key Platforms</h6>
              ${senator.platforms.map(platform => `<div class="platform-item">${platform}</div>`).join('')}
            </div>
          </div>
        `;
      }

      function loadSenators() {
        const senatorGrid = document.getElementById('senatorGrid');
        const loadingState = senatorGrid.querySelector('.loadingState');
        if (loadingState) loadingState.remove();
        
        senatorsData.forEach((senator) => {
          const initials = getInitials(senator.name);
          const col = document.createElement('div');
          col.className = 'col-xl-3 col-lg-4 col-md-6 col-sm-6';
          
          col.innerHTML = `
            <div class="card senatorCard h-100" data-senator="${senator.name}">
              <div class="senatorImageWrapper">
                <img src="${senator.image}" 
                     alt="${senator.name}" 
                     class="card-img-top senatorImg" />
                ${createPlaceholder(initials)}
              </div>
              <div class="card-body d-flex flex-column">
                <p class="senatorParty">${senator.party}</p>
                <h6 class="card-title senatorName">${senator.name}</h6>
              </div>
            </div>
          `;
          
          const img = col.querySelector('.senatorImg');
          const placeholder = col.querySelector('.placeholderImg');
          
          img.addEventListener('load', function() {
            this.style.display = 'block';
            placeholder.style.display = 'none';
          });
          
          img.addEventListener('error', function() {
            this.style.display = 'none';
            placeholder.style.display = 'flex';
          });

          const card = col.querySelector('.senatorCard');
          card.addEventListener('click', function() {
            const senatorName = this.getAttribute('data-senator');
            const senatorData = senatorsData.find((s) => s.name === senatorName);
            if (!senatorData) return;
            document.getElementById('modalTitle').textContent = senatorData.name;
            document.getElementById('modalBody').innerHTML = createModalContent(senatorData);
            senatorModal.show();
          });
          
          senatorGrid.appendChild(col);
        });
      }

      function setTheme(theme) {
        const isDark = theme === 'dark';
        document.body.classList.toggle('dark-mode', isDark);
        localStorage.setItem('senatorsTheme', theme);
        document.getElementById('themeToggleIcon').textContent =
          isDark ? '☀️' : '🌙';
        document.getElementById('themeToggleText').textContent =
          isDark ? 'Light' : 'Dark';
      }

      function toggleTheme() {
        const current = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
        setTheme(current === 'dark' ? 'light' : 'dark');
      }

      document.addEventListener('DOMContentLoaded', function() {
        const storedTheme = localStorage.getItem('senatorsTheme') || 'light';
        setTheme(storedTheme);
        loadSenators();
      });
    </script>
  </body>
</html>
