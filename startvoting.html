<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browse Candidates - iVotePH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Inter, Segoe UI, sans-serif;
        }

        .topNavbar {
            height: 80px;
            background: #fff;
            border-bottom: 1px solid #e9ecef;
        }

        .logoText {
            font-size: 2rem;
            font-weight: 800;
            color: #0d47d9;
        }

        .logoText span {
            color: #ef4444;
        }

        .searchInput {
            border-radius: 14px;
            height: 48px;
            border: 1px solid #dee2e6;
            width: 100%;
            max-width: 100%;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100%;
            padding: 20px;
            transition: 0.3s;
            z-index: 1050;
            background:
                linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('PUP.jpg') center/cover no-repeat;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-toggle {
            margin-right: 0.65rem;
            min-width: 42px;
            padding: 0.65rem 0.85rem;
        }

        .navbar-brand.logoText {
            margin-bottom: 0;
        }

        .navbar .container-fluid {
            flex-wrap: wrap;
        }

        main {
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }

        .close-btn {
            cursor: pointer;
            float: right;
            color: white;
        }

        .sidebar h5 {
            color: white;
        }

        @media(max-width:991px) {
            .sidebar {
                left: -320px;
                width: 100%;
                max-width: 320px;
            }

            .sidebar.open {
                left: 0;
            }

            .navbar-nav {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 0.75rem;
            }

            .navbar-nav .nav-link {
                width: 100%;
                padding: 0.75rem 1rem;
                border-radius: 12px;
                background: #ffffffcc;
            }

            .flex-grow-1 {
                width: 100%;
                min-width: 0;
                margin: 0.75rem 0 0;
            }

            .navbar .container-fluid {
                align-items: flex-start;
            }

            .sidebar-toggle {
                order: 1;
            }

            .navbar-brand {
                order: 2;
                margin-bottom: 0.5rem;
            }

            main {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg topNavbar px-4">
        <div class="container-fluid d-flex align-items-center gap-3">

            <button class="btn btn-light sidebar-toggle" type="button" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>

            <a class="navbar-brand logoText mb-0" href="#">
                i<span>V</span>OTE PH
            </a>

            <div class="flex-grow-1 mx-4">
                <input type="text" class="form-control searchInput" placeholder="Search candidates, positions, or topics...">
            </div>

            <ul class="navbar-nav align-items-center gap-3">
                <li class="nav-item">
                    <a class="nav-link fw-semibold text-primary" href="index.html">
                        <i class="fa-solid fa-house me-2"></i>Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="fa-solid fa-user-circle me-2"></i>
                        Juan Dela Cruz
                    </a>
                </li>
            </ul>

        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <h5>Menu <span class="close-btn" onclick="toggleSidebar()">&times;</span></h5>
        <hr>
        <div class="d-grid gap-3 mt-4">
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='about.html'">About</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='browsecandi.html'">Browse Candidates</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='electioninfo.html'">Election Info</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='myballot.html'">My Ballot</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='startvoting.html'">Start Voting</button>
        </div>
    </div>

    <main class="flex-grow-1 p-4">
        <h1>Start Voting</h1>
        <p class="text-muted">This page now shares the same navbar and sidebar UI as the rest of the site.</p>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
