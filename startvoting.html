<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Start Voting - iVotePH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Inter, Segoe UI, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        .videoBg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .videoOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
            pointer-events: none;
        }

        .topNavbar {
            height: 80px;
            background: #fff;
            border-bottom: 1px solid #e9ecef;
        }

        .logoText {
            font-size: 2rem;
            font-weight: 800;
            color: #0d47d9;
        }

        .logoText span {
            color: #ef4444;
        }

        .searchInput {
            border-radius: 14px;
            height: 48px;
            border: 1px solid #dee2e6;
            width: 100%;
            max-width: 100%;
        }

        .closeBtn {
            cursor: pointer;
            float: right;
            color: white;
        }

        .sidebar h5 {
            color: white;
        }

        .actionCard {
            border: none;
            border-radius: 20px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .04);
        }

    </style>
<link rel="stylesheet" href="style.css">
</head>

<body>
    <video class="videoBg" autoplay muted loop playsinline>
        <source src="flag.mp4" type="video/mp4">
    </video>
    <div class="videoOverlay"></div>

    
    <nav class="navbar topNavbar px-3">
        <div class="container-fluid d-flex align-items-center flex-wrap gap-2">

            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-light sidebarToggle d-lg-none" type="button" onclick="toggleSidebar()"
                    aria-label="Toggle menu" aria-controls="sidebar" aria-expanded="false">
                    <i class="fas fa-bars"></i>
                </button>
                <a href="index.html">
                    <img src="FINALS 2.png" class="brandLogo" alt="iVote PH">
                </a>
            </div>

            <div class="navbarSearchWrap d-none d-md-block">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="search" class="form-control searchInput border-start-0"
                        placeholder="Search candidates, positions, or topics…" aria-label="Search">
                </div>
            </div>

            <div class="d-flex align-items-center gap-2 ms-md-auto">
                <a href="profile.html" class="userProfileChip">
                    <img src="avatar.png" class="userAvatar" alt="Juan Dela Cruz" onerror="this.style.display='none'">
                    <div class="userMeta">
                        <div class="userName">Juan Dela Cruz</div>
                        <div class="verifiedBadge"><i class="fa-solid fa-circle-check"></i> Verified Voter</div>
                    </div>
                    <i class="fa-solid fa-chevron-down text-muted small d-none d-md-inline"></i>
                </a>
            </div>

            <div class="navbarSearchWrap d-md-none w-100">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="search" class="form-control searchInput border-start-0"
                        placeholder="Search candidates…" aria-label="Search">
                </div>
            </div>
        </div>
    </nav>

    <div class="positionNavBar">
        <ul class="positionNavList">
            <li><a href="index.html" class="active"><i class="fa-solid fa-landmark"></i> Home</a></li>
            <li><a href="profile.html"><i class="fa-solid fa-user-tie"></i> My Profile</a></li>
            <li><a href="browsecandi.html"><i class="fa-solid fa-users"></i> Candidates</a></li>
            <li><a href="startvoting.html"><i class="fa-solid fa-people-group"></i> Voting</a></li>
            <li><a href="myballot.html"><i class="fa-solid fa-building-columns"></i> My Ballot</a></li>
            <li><a href="electioninfo.html"><i class="fa-solid fa-flag"></i> Results</a></li>
            <li><a href="help.html"><i class="fa-solid fa-building"></i> Help Center</a></li>
        </ul>
    </div>

    <div class="sidebarOverlay" id="sidebarOverlay" hidden aria-hidden="true"></div>

    <div class="sidebar" id="sidebar">
        <h5>Menu <span class="closeBtn" onclick="toggleSidebar()">&times;</span></h5>
        <hr>
        <div class="d-grid gap-3 mt-4">
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='about.html'">About</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='browsecandi.html'">Browse Candidates</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='electioninfo.html'">Election Info</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='myballot.html'">My Ballot</button>
            <button class="btn btn-primary rounded-pill" onclick="window.location.href='login.html'">Login</button>
        </div>
    </div>

    <main class="flex-grow-1 p-4">
        <div class="card actionCard">
            <div class="card-body">
                <h1>Start Voting</h1>
                <p class="text-muted">Get ready to begin voting for your chosen candidates.</p>
                <button class="btn btn-primary" type="button" onclick="window.location.href='login.html'">Proceed to Login</button>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
