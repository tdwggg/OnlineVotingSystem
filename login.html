<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iVote PH Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', 'Segoe UI', sans-serif;
}

body {
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.loginContainer {
  width: 100%;
  max-width: 450px;
  padding: 20px;
}

.loginCard {
  border: none;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  padding: 40px 35px;
}

.loginCard h1 {
  font-size: 2rem;
  font-weight: 700;
  color: #1f4788;
  margin-bottom: 10px;
  text-align: center;
}

.loginSubtitle {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
  font-size: 0.95rem;
}

.formGroup {
  margin-bottom: 20px;
}

.formLabel {
  display: block;
  margin-bottom: 8px;
  color: #333;
  font-weight: 500;
  font-size: 0.95rem;
}

.formInput {
  width: 100%;
  padding: 12px 15px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 0.95rem;
  transition: all 0.3s ease;
}

.formInput:focus {
  outline: none;
  border-color: #1f4788;
  box-shadow: 0 0 0 3px rgba(31, 71, 136, 0.1);
}

.passwordWrapper {
  position: relative;
}

.passwordToggleBtn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  padding: 5px;
  font-size: 1rem;
}

.passwordToggleBtn:hover {
  color: #1f4788;
}

.forgotPasswordLink {
  text-align: right;
  margin-bottom: 20px;
}

.forgotPasswordLink a {
  color: #1f4788;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.3s;
}

.forgotPasswordLink a:hover {
  color: #3a5fa0;
  text-decoration: underline;
}

.loginBtn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #1f4788 0%, #3a5fa0 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-top: 10px;
}

.loginBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(31, 71, 136, 0.3);
}

.loginBtn:active {
  transform: translateY(0);
}

.registerLink {
  text-align: center;
  margin-top: 20px;
  color: #666;
  font-size: 0.95rem;
}

.registerLink a {
  color: #1f4788;
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s;
}

.registerLink a:hover {
  color: #3a5fa0;
}

.logoSection {
  text-align: center;
  margin-bottom: 30px;
}

.logoText {
  font-size: 1.8rem;
  font-weight: 800;
  color: #1f4788;
}

.logoText span {
  color: #e74c3c;
}

@media (max-width: 768px) {
  .loginCard {
    padding: 30px 25px;
  }

  .loginCard h1 {
    font-size: 1.7rem;
  }

  .loginContainer {
    max-width: 100%;
  }
}
</style>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loginContainer">
  <div class="loginCard">
    <div class="logoSection">
      <div class="logoText authLogo"><img src="logo.png" alt="iVotePH" class="authLogoImg"></div>
    </div>

    <h1>Login</h1>
    <p class="loginSubtitle">Access your voting account securely</p>

    <form id="loginForm">
      <div class="formGroup">
        <label class="formLabel">Precinct Number</label>
        <input
          id="precinct"
          type="text"
          class="formInput"
          placeholder="Enter your precinct number"
          required>
      </div>

      <div class="formGroup">
        <label class="formLabel">Password</label>
        <div class="passwordWrapper">
          <input
            id="password"
            type="password"
            class="formInput"
            placeholder="Enter your password"
            required>
          <button type="button" class="passwordToggleBtn" id="togglePassword">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div class="forgotPasswordLink">
        <a href="forgotPassword.html">Forgot Password?</a>
      </div>

      <button type="submit" class="loginBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
      </button>
    </form>

    <div class="registerLink">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("togglePassword").addEventListener("click", function(e) {
  e.preventDefault();
  const passwordInput = document.getElementById("password");
  const icon = this.querySelector("i");

  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    icon.classList.remove("bi-eye");
    icon.classList.add("bi-eye-slash");
  } else {
    passwordInput.type = "password";
    icon.classList.remove("bi-eye-slash");
    icon.classList.add("bi-eye");
  }
});

document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const precinct = document.getElementById("precinct").value.trim();
  const password = document.getElementById("password").value.trim();

  if (precinct === "") {
    alert("Please enter your precinct number.");
    return;
  }

  if (password === "") {
    alert("Please enter your password.");
    return;
  }

  sessionStorage.setItem("isLoggedIn", "true");
  window.location.href = "index.html";
});
</script>

</body>
</html>
