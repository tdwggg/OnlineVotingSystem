<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - iVotePH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
img.brandLogo{width:126px!important;max-width:126px!important;height:auto!important;max-height:46px!important;object-fit:contain!important;display:block!important}.userNavList,.sidebarMenuNav{list-style:none!important;margin:0!important;padding:0!important}.userNavList{display:flex!important;gap:8px!important;overflow-x:auto!important}.userNavList li,.sidebarMenuNav li{list-style:none!important}.userTopbarInner{display:flex!important;align-items:center!important;gap:14px!important}.userSidebar,#sidebar{transform:translateX(-110%)}.userSidebar.open,#sidebar.open{transform:translateX(0)}
</style>
  <link rel="stylesheet" href="style.css">
  
</head>
<body class="authPage">
  <div class="loginContainer">
    <div class="loginCard card">
      <div class="authLogo"><img src="FINALS 2.png" alt="iVotePH" class="authLogoImg"></div>
      <h1>Login</h1>
      <p class="loginSubtitle">Access your voting account securely</p>
      <form id="loginForm">
        <div class="formGroup"><label class="formLabel">Voter ID</label><input id="voterId" type="text" class="formInput" placeholder="Enter your Voter ID" required></div>
        <div class="formGroup"><label class="formLabel">Password</label><div class="passwordWrapper"><input id="password" type="password" class="formInput" placeholder="Enter your password" required><button type="button" class="passwordToggleBtn" id="togglePassword"><i class="fa-solid fa-eye"></i></button></div></div>
        <div class="forgotPasswordLink text-end mb-3"><a href="#">Forgot Password?</a></div>
        <button type="submit" class="loginBtn btn w-100 py-3"><i class="fa-solid fa-right-to-bracket me-2"></i>Log In</button>
      </form>
      <div class="registerLink text-center mt-3">Don't have an account? <a href="register.html">Register here</a></div>
    </div>
  </div>
  <script>
    document.getElementById('togglePassword').addEventListener('click', function(){var p=document.getElementById('password');p.type=p.type==='password'?'text':'password';});
    document.getElementById('loginForm').addEventListener('submit', function(e){e.preventDefault();sessionStorage.setItem('isLoggedIn','true');window.location.href='index.html';});
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
