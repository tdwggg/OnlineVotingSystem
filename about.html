<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
        body {
            background: #f5f7fb;
            font-family: Inter, Segoe UI, sans-serif;
        }

        .topNavbar {
            height: 80px;
            background: #fff;
            border-bottom: 1px solid #e9ecef;
        }

        .logoText {
            font-size: 2rem;
            font-weight: 800;
            color: #0d47d9;
        }

        .logoText span {
            color: #ef4444;
        }

        .searchInput {
            border-radius: 14px;
            height: 48px;
            border: 1px solid #dee2e6;
        }

        .sideBar {
            width: 240px;
            min-height: calc(100vh - 80px);
            background: #fff;
            border-right: 1px solid #e9ecef;
        }

        .menuItem {
            color: #1e293b;
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .menuItem.active {
            background: #0d47d9;
            color: #fff;
        }

        .dashboardCard {
            border: none;
            border-radius: 20px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .04);
        }

        .shieldCircle {
            width: 110px;
            height: 110px;
            background: #edf3ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0d47d9;
            font-size: 3rem;
        }

        .statusBox {
            background: #f4f7ff;
            border-radius: 14px;
            padding: 16px;
        }

        .quickAction {
            border: 1px solid #e9ecef;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
        }

        .quickAction i {
            color: #0d47d9;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .countdownBox {
            background: #f4f7ff;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .countdownBox h4 {
            color: #0d47d9;
            margin-bottom: 0;
        }

        .primaryButton {
            background: #0d47d9;
            border: none;
            border-radius: 12px;
            color: white;
            padding: 14px;
            width: 100%;
        }

        .candidateTab {
            color: #64748b;
            font-weight: 600;
            padding-bottom: 10px;
            cursor: pointer;
        }

        .candidateTab.active {
            color: #0d47d9;
            border-bottom: 3px solid #0d47d9;
        }

        .candidateCard {
            border: 1px solid #edf1f7;
            border-radius: 18px;
            padding: 20px;
        }

        .candidateAvatar {
            width: 64px;
            height: 64px;
            background: #edf3ff;
            border-radius: 50%;
        }

        .candidateBadge {
            background: #edf3ff;
            color: #0d47d9;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .profileLink {
            color: #0d47d9;
            text-decoration: none;
            font-weight: 600;
        }

        .stepIcon {
            width: 60px;
            height: 60px;
            background: #edf3ff;
            border-radius: 50%;
            color: #0d47d9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        @media(max-width:991px) {
            .sideBar {
                display: none;
            }
        }
        </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg topNavbar px-4">
        <div class="container-fluid">

            <a class="navbar-brand logoText" href="#">
                i<span>V</span>OTE PH
            </a>

            <div class="flex-grow-1 mx-4">
                <input type="text" class="form-control searchInput"
                    placeholder="Search candidates, positions, or topics...">
            </div>

            <ul class="navbar-nav align-items-center gap-3">
                <li class="nav-item">
                    <a class="nav-link fw-semibold text-primary" href="index.html">
                        <i class="fa-solid fa-house me-2"></i>Home
                    </a>
                </li>



                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="fa-solid fa-user-circle me-2"></i>
                        Juan Dela Cruz
                    </a>
                </li>
            </ul>

        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
