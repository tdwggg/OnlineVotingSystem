```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>iVote PH Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

.login-page{
position:relative;
min-height:100vh;
overflow:hidden;
background:#000;
}

.login-video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.login-page::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:1;
}

.login-container{
position:relative;
z-index:2;
}

.login-card{
padding:50px;
border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.2);
color:white;
box-shadow:0 8px 30px rgba(0,0,0,.3);
}

.login-card h1{
font-size:2.5rem;
font-weight:700;
}

.custom-input{
background:transparent;
border:none;
border-bottom:2px solid white;
border-radius:0;
color:white;
}

.custom-input:focus{
background:transparent;
box-shadow:none;
border-color:white;
color:white;
}

.custom-input::placeholder{
color:rgba(255,255,255,.7);
}

.login-card a{
color:white;
font-weight:600;
text-decoration:none;
}

.btn-light{
border-radius:15px;
transition:.3s;
}

.btn-light:hover{
transform:translateY(-3px);
}

@media(max-width:768px){

.login-card{
padding:30px;
}

.login-card h1{
font-size:2rem;
}

}
</style>

</head>

<body class="login-page">

<video class="login-video-bg" autoplay muted loop playsinline>
<source src="flag.mp4" type="video/mp4">
</video>

<div class="container-fluid vh-100 login-container">

<div class="row h-100 justify-content-center align-items-center">

<div class="col-lg-5 col-md-7 col-sm-10">

<div class="login-card">

<h1 class="text-center mb-5">
Register
</h1>

<form id="registerForm">

<div class="mb-4">
<label class="form-label">
Full Name
</label>

<input
id="fullname"
type="text"
class="form-control custom-input"
placeholder="Enter Full Name">
</div>

<div class="mb-4">
<label class="form-label">
Precinct Number
</label>

<input
id="precinct"
type="text"
class="form-control custom-input"
placeholder="Enter Precinct Number">
</div>

<div class="mb-4">
<label class="form-label">
Password
</label>

<input
id="password"
type="password"
class="form-control custom-input"
placeholder="Create Password">
</div>

<div class="form-check mb-4">

<input
id="agree"
class="form-check-input"
type="checkbox">

<label class="form-check-label">
I agree to the terms and conditions
</label>

</div>

<button
type="submit"
class="btn btn-light w-100 btn-lg fw-bold">
Create Account
</button>

<p class="text-center mt-4">
Already have an account?
<a href="login.html">Login</a>
</p>

</form>

</div>

</div>

</div>

</div>

<script>

document.getElementById("registerForm")
.addEventListener("submit",function(e){

e.preventDefault();

const fullname =
document.getElementById("fullname").value.trim();

const precinct =
document.getElementById("precinct").value.trim();

const password =
document.getElementById("password").value.trim();

const agree =
document.getElementById("agree").checked;

if(fullname===""){
alert("Please enter your full name.");
return;
}

if(precinct===""){
alert("Please enter your precinct number.");
return;
}

if(password.length<6){
alert("Password must be at least 6 characters.");
return;
}

if(!agree){
alert("Please agree to the terms and conditions.");
return;
}

alert("Registration Successful!");

window.location.href="dashboard.html";

});

</script>

</body>
</html>
