<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - iVotePH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
img.brandLogo{width:126px!important;max-width:126px!important;height:auto!important;max-height:46px!important;object-fit:contain!important;display:block!important}.userNavList,.sidebarMenuNav{list-style:none!important;margin:0!important;padding:0!important}.userNavList{display:flex!important;gap:8px!important;overflow-x:auto!important}.userNavList li,.sidebarMenuNav li{list-style:none!important}.userTopbarInner{display:flex!important;align-items:center!important;gap:14px!important}.userSidebar,#sidebar{transform:translateX(-110%)}.userSidebar.open,#sidebar.open{transform:translateX(0)}
</style>
  <link rel="stylesheet" href="style.css">
  
</head>
<body class="authPage">
  <div class="registerContainer">
    <div class="registerCard card">
      <div class="authLogo"><img src="FINALS 2.png" alt="iVotePH" class="authLogoImg"></div>
      <h1>Register</h1>
      <p class="registerSubtitle">Create your voter account using your existing Voter ID</p>
      <form id="registerForm">
        <div class="formSection"><div class="formSectionTitle">Voter Verification</div><div class="formGroup"><label class="formLabel">Voter ID</label><input id="voterId" type="text" class="formInput" placeholder="Enter existing Voter ID" required></div></div>
        <div class="formSection"><div class="formSectionTitle">Personal Information</div><div class="row"><div class="col-md-4"><div class="formGroup"><label class="formLabel">First Name</label><input type="text" class="formInput" required></div></div><div class="col-md-4"><div class="formGroup"><label class="formLabel">Middle Name</label><input type="text" class="formInput"></div></div><div class="col-md-4"><div class="formGroup"><label class="formLabel">Last Name</label><input type="text" class="formInput" required></div></div></div><div class="row"><div class="col-md-4"><div class="formGroup"><label class="formLabel">Birthdate</label><input type="date" class="formInput" required></div></div><div class="col-md-4"><div class="formGroup"><label class="formLabel">Sex</label><select class="formSelect" required><option value="">Select Sex</option><option>Male</option><option>Female</option></select></div></div><div class="col-md-4"><div class="formGroup"><label class="formLabel">Mobile Number</label><div class="phoneInputWrapper"><div class="phonePrefix">+63</div><input type="tel" class="formInput" placeholder="9123456789" required></div></div></div></div></div>
        <div class="formSection addressSection"><div class="formSectionTitle">Address Information</div><div class="row"><div class="col-md-6"><div class="formGroup"><label class="formLabel">Region</label><input type="text" class="formInput" required></div></div><div class="col-md-6"><div class="formGroup"><label class="formLabel">Province</label><input type="text" class="formInput" required></div></div></div><div class="row"><div class="col-md-6"><div class="formGroup"><label class="formLabel">City / Municipality</label><input type="text" class="formInput" required></div></div><div class="col-md-6"><div class="formGroup"><label class="formLabel">Barangay</label><input type="text" class="formInput" required></div></div></div><div class="formGroup"><label class="formLabel">Specific Address</label><input type="text" class="formInput" required></div></div>
        <div class="formSection"><div class="formSectionTitle">Account Security</div><div class="row"><div class="col-md-6"><div class="formGroup"><label class="formLabel">Password</label><input id="password" type="password" class="formInput" required></div></div><div class="col-md-6"><div class="formGroup"><label class="formLabel">Confirm Password</label><input id="confirmPassword" type="password" class="formInput" required></div></div></div></div>
        <div class="formCheckbox"><input type="checkbox" id="agree" required><label for="agree">I agree to the terms and privacy policy</label></div>
        <button type="submit" class="registerBtn btn w-100 py-3"><i class="fa-solid fa-user-plus me-2"></i>Create Account</button>
      </form>
      <div class="loginLink text-center mt-3">Already registered? <a href="login.html">Log in</a></div>
    </div>
  </div>
  <script>document.getElementById('registerForm').addEventListener('submit',function(e){e.preventDefault();var p=document.getElementById('password').value;var c=document.getElementById('confirmPassword').value;if(p!==c){alert('Passwords do not match.');return;}sessionStorage.setItem('isLoggedIn','true');window.location.href='index.html';});</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
